version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fgbmfi
      POSTGRES_PASSWORD: fgbmfi_secret
      POSTGRES_DB: annuaire_fgbmfi
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://fgbmfi:fgbmfi_secret@db:5432/annuaire_fgbmfi
      JWT_SECRET: change-me-in-production
      JWT_REFRESH_SECRET: change-me-refresh-in-production
      PORT: 3001
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
